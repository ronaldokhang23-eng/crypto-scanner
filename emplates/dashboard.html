<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Level Scanner - POC, VAL, VAH, VWAP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #00ff00;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 0 0 10px #00ff00;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 10px;
            border: 1px solid #00ff00;
        }
        
        .stat-box {
            text-align: center;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            overflow: hidden;
        }
        
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #333;
        }
        
        th {
            background: #00ff0011;
            color: #00ff00;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }
        
        tr:hover {
            background: rgba(0, 255, 0, 0.1);
        }
        
        .symbol {
            font-weight: bold;
            font-size: 14px;
        }
        
        .price {
            font-family: monospace;
            font-size: 14px;
        }
        
        .touch {
            background: #00ff0022;
            color: #00ff00;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        
        .no-touch {
            color: #444;
        }
        
        .level-value {
            font-size: 12px;
            color: #aaa;
        }
        
        @keyframes pulse {
            0% { background: #00ff0022; }
            50% { background: #00ff0044; }
            100% { background: #00ff0022; }
        }
        
        .status-icon {
            font-size: 18px;
        }
        
        .refresh {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
        
        .alert-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 11px;
            margin: 2px;
        }
        
        .badge-vwap { background: #0066ff; color: white; }
        .badge-poc { background: #ff6600; color: white; }
        .badge-val { background: #00cc66; color: white; }
        .badge-vah { background: #ff3366; color: white; }
        
        @media (max-width: 768px) {
            th, td {
                padding: 6px;
                font-size: 10px;
            }
            .level-value {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 CRYPTO LEVEL SCANNER</h1>
        <div class="subtitle">POC | VAL | VAH | VWAP — Real-time Touch Detection</div>
        
        <div class="stats" id="stats">
            <div class="stat-box">
                <div class="stat-label">Last Scan</div>
                <div class="stat-value" id="lastScan">--</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Coins</div>
                <div class="stat-value" id="totalCoins">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Active Touches</div>
                <div class="stat-value" id="activeTouches">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Next Scan</div>
                <div class="stat-value" id="nextScan">30s</div>
            </div>
        </div>
        
        <table id="scannerTable">
            <thead>
                <tr>
                    <th>Symbol</th>
                    <th>Price</th>
                    <th>VWAP</th>
                    <th>Prev POC</th>
                    <th>Prev VAL</th>
                    <th>Prev VAH</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr>
                    <td colspan="7" style="text-align: center;">Loading scanner data...</td>
                </tr>
            </tbody>
        </table>
        
        <div class="refresh">
            Auto-refreshing every 5 seconds | Levels update daily at midnight UTC
        </div>
    </div>
    
    <script>
        let countdown = 30;
        
        function updateUI(data) {
            const results = data.results || [];
            const totalCoins = results.length;
            let activeTouches = 0;
            
            // Count active touches
            results.forEach(coin => {
                if (coin.touching_vwap || coin.touching_prev_poc || 
                    coin.touching_prev_val || coin.touching_prev_vah) {
                    activeTouches++;
                }
            });
            
            // Update stats
            document.getElementById('totalCoins').textContent = totalCoins;
            document.getElementById('activeTouches').textContent = activeTouches;
            
            if (data.last_scan) {
                const lastScan = new Date(data.last_scan);
                document.getElementById('lastScan').textContent = lastScan.toLocaleTimeString();
            }
            
            // Build table
            const tbody = document.getElementById('tableBody');
            
            if (results.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">No data yet. Scanner running...</td></tr>';
                return;
            }
            
            tbody.innerHTML = results.map(coin => {
                const touches = [];
                let rowClass = '';
                
                if (coin.touching_vwap) {
                    touches.push('<span class="alert-badge badge-vwap">VWAP</span>');
                    rowClass = 'touch';
                }
                if (coin.touching_prev_poc) {
                    touches.push('<span class="alert-badge badge-poc">POC</span>');
                    rowClass = 'touch';
                }
                if (coin.touching_prev_val) {
                    touches.push('<span class="alert-badge badge-val">VAL</span>');
                    rowClass = 'touch';
                }
                if (coin.touching_prev_vah) {
                    touches.push('<span class="alert-badge badge-vah">VAH</span>');
                    rowClass = 'touch';
                }
                
                const statusHtml = touches.length > 0 ? 
                    `<div class="status-icon">🔴 ${touches.join(' ')}</div>` : 
                    '<span class="no-touch">⚪ No touch</span>';
                
                return `
                    <tr class="${rowClass}">
                        <td class="symbol">${coin.symbol}</td>
                        <td class="price">$${coin.price?.toFixed(4) || '--'}</td>
                        <td>
                            $${coin.vwap?.toFixed(4) || '--'}
                            ${coin.touching_vwap ? '<br><span style="color:#00ff00;">✓ TOUCH</span>' : ''}
                        </td>
                        <td>
                            $${coin.prev_poc?.toFixed(4) || '--'}
                            ${coin.touching_prev_poc ? '<br><span style="color:#00ff00;">✓ TOUCH</span>' : ''}
                            <div class="level-value">POC</div>
                        </td>
                        <td>
                            $${coin.prev_val?.toFixed(4) || '--'}
                            ${coin.touching_prev_val ? '<br><span style="color:#00ff00;">✓ TOUCH</span>' : ''}
                            <div class="level-value">VAL</div>
                        </td>
                        <td>
                            $${coin.prev_vah?.toFixed(4) || '--'}
                            ${coin.touching_prev_vah ? '<br><span style="color:#00ff00;">✓ TOUCH</span>' : ''}
                            <div class="level-value">VAH</div>
                        </td>
                        <td>${statusHtml}</td>
                    </tr>
                `;
            }).join('');
        }
        
        function fetchData() {
            fetch('/api/results')
                .then(response => response.json())
                .then(data => {
                    updateUI(data);
                })
                .catch(error => {
                    console.error('Error fetching data:', error);
                });
        }
        
        // Countdown timer for next scan
        function updateCountdown() {
            if (countdown <= 0) {
                countdown = 30;
                fetchData();
            }
            document.getElementById('nextScan').textContent = countdown + 's';
            countdown--;
        }
        
        // Initial fetch
        fetchData();
        
        // Refresh every 5 seconds
        setInterval(fetchData, 5000);
        
        // Countdown update
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
